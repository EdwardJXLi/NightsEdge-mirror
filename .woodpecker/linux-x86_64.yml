depends_on: []

when:
  - event: [push, manual]
    branch: main
  - event: tag

labels:
  platform: linux/amd64

steps:
  - name: fetch-source
    image: alpine:latest
    commands:
      - 'echo "==> Runner architecture: $(uname -m)"'
      - apk add --no-cache git bash curl python3
      - bash scripts/fetch-source.sh

  - name: build
    image: ubuntu:24.04
    environment:
      UPDATE_URL_BASE: https://nightsedge.hydranet.dev
    commands:
      - 'echo "==> Runner architecture: $(uname -m)"'
      - apt-get update && apt-get install -y build-essential gcc g++ libc6-dev python3 python3-pip nodejs npm
        git curl wget libgtk-3-dev libdbus-glib-1-dev libxt-dev
        nasm yasm libpulse-dev libasound2-dev clang lld libclang-dev llvm pkg-config
        rustc cargo
      - bash scripts/build.sh linux-x86_64
      - bash scripts/generate-mar.sh linux-x86_64 "$UPDATE_URL_BASE"
      - mkdir -p artifacts/linux-x86_64
      - find mozilla-release \( -path "*/dist/*.tar.xz" -o -path "*/dist/*.tar.bz2" \) -exec cp -t artifacts/linux-x86_64 {} +
      - find mozilla-release -path "*/dist/*.txt" -exec cp -t artifacts/linux-x86_64 {} +
      - cp -r output/mar/linux-x86_64 artifacts/linux-x86_64/mar
    artifacts:
      - artifacts/linux-x86_64/**

  - name: upload-forgejo-release
    image: woodpeckerci/plugin-release:latest
    settings:
      base_url: https://forgejo.hydranet.dev
      api_key:
        from_secret: FORGEJO_RELEASE_TOKEN
      files:
        - artifacts/linux-x86_64/**
    when:
      - event: tag
      - event: manual
