when:
  event: push
  branch: main

platform: linux/arm64

steps:
  - name: fetch-source
    image: alpine:latest
    commands:
      - apk add --no-cache mercurial bash
      - bash scripts/fetch-source.sh

  - name: build
    image: ubuntu:22.04
    commands:
      - apt-get update && apt-get install -y build-essential python3 python3-pip nodejs npm
        mercurial git curl wget libgtk-3-dev libdbus-glib-1-dev libxt-dev
        nasm yasm libpulse-dev libasound2-dev libclang-dev
      - bash scripts/build.sh linux-aarch64
