depends_on: []

when:
  - event: [push, manual]
    branch: main
  - event: tag

labels:
  platform: linux/amd64

steps:
  - name: fetch-source
    image: alpine:latest
    commands:
      - 'echo "==> Runner architecture: $(uname -m)"'
      - apk add --no-cache git bash curl python3
      - bash scripts/fetch-source.sh

  # --- x86_64 build ---

  - name: build-x86_64
    image: ubuntu:24.04
    environment:
      BUILD_X86_64: "true"
      SCCACHE_VERSION: "0.10.0"
      SCCACHE_DISABLE: 0
      AWS_ACCESS_KEY_ID:
        from_secret: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY:
        from_secret: AWS_SECRET_ACCESS_KEY
      SCCACHE_BUCKET: nightsedge-cache
      SCCACHE_ENDPOINT: s3.hydranet.dev
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
    commands:
      - 'echo "==> Runner architecture: $(uname -m)"'
      - apt-get update && apt-get install -y python3 git curl mercurial ca-certificates tar xz-utils bzip2
      - |
        curl -fsSL -o /tmp/sccache.tar.gz "https://github.com/mozilla/sccache/releases/download/v$SCCACHE_VERSION/sccache-v$SCCACHE_VERSION-x86_64-unknown-linux-musl.tar.gz"
        tar -xzf /tmp/sccache.tar.gz -C /tmp
        install -m 0755 "/tmp/sccache-v$SCCACHE_VERSION-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
        sccache --version
      - |
        if [ "${BUILD_X86_64:-true}" != "true" ]; then
          echo "==> Skipping linux-x86_64 build (BUILD_X86_64=${BUILD_X86_64:-unset})"
          exit 0
        fi
        bash scripts/build.sh linux-x86_64

  - name: package-x86_64
    image: ubuntu:24.04
    environment:
      UPDATE_URL_BASE: https://nightsedge.hydranet.dev
    commands:
      - 'echo "==> Runner architecture: $(uname -m)"'
      - apt-get update && apt-get install -y xz-utils zip unzip
      - |
        OBJ_DIR="$(find mozilla-release -maxdepth 1 -name 'obj-x86_64-pc-linux-gnu' -type d | head -1)"
        if [ -z "$OBJ_DIR" ]; then
          echo "==> Skipping linux-x86_64 package step because no build output was found"
          exit 0
        fi
        bash scripts/generate-mar.sh linux-x86_64 "$UPDATE_URL_BASE"
      - mkdir -p artifacts/linux-x86_64
      - OBJ_DIR="$(find mozilla-release -maxdepth 1 -name 'obj-x86_64-pc-linux-gnu' -type d | head -1)" && test -n "$OBJ_DIR" && find "$OBJ_DIR/dist" -maxdepth 1 -type f \( -name '*.tar.xz' -o -name '*.tar.bz2' -o -name '*.txt' \) -exec cp -t artifacts/linux-x86_64 {} +
      - cp -r output/mar/linux-x86_64 artifacts/linux-x86_64/mar

  # --- aarch64 build ---

  - name: build-aarch64
    image: ubuntu:24.04
    environment:
      BUILD_AARCH64: "true"
      SCCACHE_VERSION: "0.10.0"
      SCCACHE_DISABLE: 0
      AWS_ACCESS_KEY_ID:
        from_secret: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY:
        from_secret: AWS_SECRET_ACCESS_KEY
      SCCACHE_BUCKET: nightsedge-cache
      SCCACHE_ENDPOINT: s3.hydranet.dev
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
    commands:
      - 'echo "==> Runner architecture: $(uname -m)"'
      - apt-get update && apt-get install -y python3 git curl mercurial ca-certificates tar xz-utils bzip2
      - |
        curl -fsSL -o /tmp/sccache.tar.gz "https://github.com/mozilla/sccache/releases/download/v$SCCACHE_VERSION/sccache-v$SCCACHE_VERSION-x86_64-unknown-linux-musl.tar.gz"
        tar -xzf /tmp/sccache.tar.gz -C /tmp
        install -m 0755 "/tmp/sccache-v$SCCACHE_VERSION-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
        sccache --version
      - |
        if [ "${BUILD_AARCH64:-true}" != "true" ]; then
          echo "==> Skipping linux-aarch64 build (BUILD_AARCH64=${BUILD_AARCH64:-unset})"
          exit 0
        fi
        bash scripts/build.sh linux-aarch64

  - name: package-aarch64
    image: ubuntu:24.04
    environment:
      UPDATE_URL_BASE: https://nightsedge.hydranet.dev
    commands:
      - 'echo "==> Runner architecture: $(uname -m)"'
      - apt-get update && apt-get install -y xz-utils zip unzip
      - |
        OBJ_DIR="$(find mozilla-release -maxdepth 1 -name 'obj-aarch64-unknown-linux-gnu' -type d | head -1)"
        if [ -z "$OBJ_DIR" ]; then
          echo "==> Skipping linux-aarch64 package step because no build output was found"
          exit 0
        fi
        bash scripts/generate-mar.sh linux-aarch64 "$UPDATE_URL_BASE"
      - mkdir -p artifacts/linux-aarch64
      - OBJ_DIR="$(find mozilla-release -maxdepth 1 -name 'obj-aarch64-unknown-linux-gnu' -type d | head -1)" && test -n "$OBJ_DIR" && find "$OBJ_DIR/dist" -maxdepth 1 -type f \( -name '*.tar.xz' -o -name '*.tar.bz2' -o -name '*.txt' \) -exec cp -t artifacts/linux-aarch64 {} +
      - cp -r output/mar/linux-aarch64 artifacts/linux-aarch64/mar

  # --- upload both architectures ---

  - name: upload-forgejo-release
    image: woodpeckerci/plugin-release:latest
    settings:
      base_url: https://forgejo.hydranet.dev
      api_key:
        from_secret: FORGEJO_RELEASE_TOKEN
      files:
        - artifacts/linux-x86_64/**
        - artifacts/linux-aarch64/**
    when:
      - event: tag
      - event: manual
